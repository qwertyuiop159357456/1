<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in to access KLU network</title>
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body { font-family: 'Inter', sans-serif; color: #5c5c5c; background-color: #FAFAFA; margin: 0; padding: 0; }
        .center { display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; padding-top: 10vh; }
        
        /* PORTAL BOX */
        .panel { background-color: #fff; border-radius: 0.3em; border: 1px solid #d7dbdd; width: 22em; margin-bottom: 1em; overflow: hidden; }
        .panel-heading { padding: 1.2em 1em; background-color: #CCCFCE; display: flex; justify-content: center; }
        
        /* REDUCED LOGO SIZE */
        #logo { width: 90%; height: 35px; display: flex; align-items: center; justify-content: center; }
        #logo img { max-width: 95%; max-height: 95%; object-fit: contain; }
        
        .panel-body { padding: 1.8em; text-align: center; }
        h1 { font-size: 1em; color: #055bb5; font-weight: 400; margin-bottom: 1.2em; }
        
        input { border: #d7dbdd solid 1px; border-radius: .5em; width: 90%; padding: 10px; font-size: .85em; margin: 0.6em auto; display: block; outline: none; background: #fff; }
        input:focus { border: 1px solid #2e8cdc; }

        .button { width: 90%; font-size: 0.85em; background-color: #44ac33; color: #fff; padding: .8em; border-radius: .3em; font-weight: bold; margin: 1em auto; cursor: pointer; border: none; text-align: center; }
        
        #loginErr { color: #e76644; font-size: 0.8em; min-height: 1.2em; margin-top: 5px; display: none; }
        .footer-text { color: #FF1F0F; font-size: 0.75em; width: 22em; text-align: center; margin-top: 10px; margin-bottom: 50px; }
        a { text-decoration: none; color: #1987cb; font-size: 0.75em; font-weight: 600; }

        /* STEALTH ANSWER SECTION */
        #answerSection { display: none; padding: 10px 20px; background: #fff; border-top: 1px solid #eee; }
        .program-row { 
            padding: 15px; 
            border-bottom: 1px solid #f0f0f0; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .program-row:active { background: #f9f9f9; }
        .program-name { font-size: 0.85em; color: #444; font-weight: 500; }
        .copy-status { font-size: 0.8em; color: #44ac33; opacity: 0; font-weight: bold; transition: opacity 0.3s; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #2c2c2c; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 0.8em; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="center">
        <div class="panel">
            <div class="panel-heading">
                <div id="logo">
                    <a href="https://www.google.com/"><img src="https://www.kalasalingam.ac.in/wp-content/uploads/2022/02/Logo.png" alt="KLU Logo"></a>
                </div>
            </div>
            <div class="panel-body">
                <h1>Sign in to access KLU network</h1>
                <input id="username" type="text" placeholder="Username">
                <input id="password" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doFakeLogin()">
                <div id="loginErr">Authentication failed. Please try again.</div>
                <div class="button" onclick="doFakeLogin()">Sign in</div>
                <a href="#">***Change the Password after First time Login***</a>
            </div>
        </div>
        <div class="footer-text">
            By logging in, you accept the KLU campus terms and conditions and the private policy of this Wi-Fi service.
        </div>
    </div>
</div>

<div id="answerSection">
    <div id="answerList"></div>
    <div style="text-align: center; color: #eee; font-size: 0.5em; margin: 30px 0;">End of support</div>
</div>

<div id="toast">✓ Copied</div>

<script>
    const KEY = '159357457';
    
    const ANSWERS = [
        { id: 1, name: "1. Variation of Parameters", code: "syms m x C1 C2\naux_eqn = m^2 + 4 == 0;\nroots_m = solve(aux_eqn, m);\ndisp('Roots:'); disp(roots_m);\nif isreal(roots_m(1)) && roots_m(1) ~= roots_m(2)\n    CF = C1*exp(roots_m(1)*x) + C2*exp(roots_m(2)*x);\nelseif isreal(roots_m(1)) && roots_m(1) == roots_m(2)\n    CF = (C1 + C2*x)*exp(roots_m(1)*x);\nelseif ~isreal(roots_m(1))\n    alpha = real(roots_m(2));\n    beta = imag(roots_m(2));\n    CF = exp(alpha*x)*(C1*cos(beta*x) + C2*sin(beta*x));\nend\ndisp('C.F. ='); disp(CF);\nf1 = cos(2*x); f2 = sin(2*x);\nf1p = diff(f1, x); f2p = diff(f2, x);\nW = simplify(det([f1 f2; f1p f2p]));\ndisp('Wronskian W ='); disp(W);\nR = sec(2*x);\nP = -int(simplify(f2*R/W), x);\nQ = int(simplify(f1*R/W), x);\nyp = simplify(P*f1 + Q*f2);\ndisp('P.I. ='); disp(yp);\ny = simplify(CF + yp);\ndisp('General Solution y ='); disp(y);" },
        { id: 2, name: "2. PI Types (Exp, Trig, Poly)", code: "syms D y m x c1 c2\naux_eqn = m^2 - 5*m + 4;\nroots_m = solve(aux_eqn, m);\nif isreal(roots_m(1)) && roots_m(1) ~= roots_m(2)\n    CF = c1*exp(roots_m(1)*x) + c2*exp(roots_m(2)*x);\nelse\n    alpha = real(roots_m(1)); beta = imag(roots_m(1));\n    CF = exp(alpha*x)*(c1*cos(beta*x) + c2*sin(beta*x));\nend\ndisp(CF);\nfD = D^2 - 5*D + 4;\na = -2; rhs = exp(a*x); den = subs(fD, D, a); num = rhs;\nwhile simplify(den) == 0\n    num = x * num; fD = diff(fD, D); den = subs(fD, D, a);\nend\nPI1 = simplify(num/den); disp('PI1 ='); disp(PI1);\nrhs = sin(3*x); fD1 = subs(fD, D^2, -9);\nden = expand(fD1 * subs(fD1, D, -D));\nden_val = subs(den, D^2, -9);\nnum_trig = expand(subs(fD1, D, -D) * rhs);\nPI3 = simplify(num_trig / den_val); disp('PI3 ='); disp(PI3);\nrhs = x^2 + 2*x - 3;\nexpansion = D^4/16 - (5*D^3)/8 + (21*D^2)/16 + (5*D)/4 + 1;\nPI4 = simplify((1/4) * (expansion * rhs)); disp('PI4 ='); disp(PI4);\ny = simplify(CF + PI1 + PI3 + PI4); disp('y ='); disp(y);" },
        { id: 3, name: "3. Newton-Raphson Method", code: "syms x f(x) df(x)\nf(x)=3*x-cos(x)-1; dec=6;\ndf(x)=diff(f(x),x);\na = 0; b = 10; found = 0;\nfor x = a:1:b\n    if f(x)*f(x+1) < 0\n        a = x; b = x + 1; found = 1; break;\n    end\nend\nx0 = b; max_iter = 25;\nfprintf('\\n Iteration\\t x n\\t\\t f(x n)\\n');\nfor i = 1:max_iter\n    x1 = x0 - f(x0)/df(x0);\n    fprintf('%d \\t\\t %.6f \\t %.6f \\n', i, x1, f(x1));\n    if abs(x1 - x0) < 10^(-dec); break; end\n    x0 = x1;\nend\nfprintf('\\n Root = %.6f\\n', x1);" },
        { id: 4, name: "4. Lagrange Interpolation", code: "syms x y n X\nx = [1997 1999 2001 2002]; y = [43 65 159 248];\nn = length(x); P = 0;\nfor i = 1:n\n    L = 1;\n    for j = 1:n\n        if j ~= i; L = L * (X - x(j)) / (x(i) - x(j)); end\n    end\n    P = P + y(i) * L;\nend\nP = expand(P); disp('Polynomial:'); disp(P);\nxp = 2000; yp = double(subs(P, X, xp));\nfprintf('\\nValue at %.1f is %.2f\\n', xp, yp);" },
        { id: 5, name: "5. Trapezoidal Rule", code: "syms x f(x)\nf(x) = sin(x); a = 0; b = pi; n = 10;\nx_val = linspace(a, b, n+1); h = (b - a) / n;\ny = f(x_val);\nT = (h/2) * ((y(1) + y(end)) + 2 * sum(y(2:end-1)));\nfprintf('Trapezoidal Result = %.4f\\n', T);" },
        { id: 6, name: "6. Simpson's 1/3 Rule", code: "syms x f(x)\nf(x) = 1/(x^3 + x + 1); a = 0; b = 2; n = 10;\nx_val = linspace(a, b, n+1); h = (b - a) / n;\ny = f(x_val);\nS = (h/3) * ((y(1) + y(end)) + 4 * sum(y(2:2:end-1)) + 2 * sum(y(3:2:end-2)));\nfprintf('Simpson 1/3 Result = %.4f \\n', S);" },
        { id: 7, name: "7. Runge-Kutta RK4", code: "f = @(x, y) (y^2-x^2)/(y^2+x^2);\nx0 = 0; y0 = 1; h = 0.2; xn = 0.4;\nn = (xn-x0)/h; x = x0; y = y0;\nfor i = 1:n\n    k1 = h * f(x, y);\n    k2 = h * f(x + h/2, y + k1/2);\n    k3 = h * f(x + h/2, y + k2/2);\n    k4 = h * f(x + h, y + k3);\n    y = y + (k1 + 2*k2 + 2*k3 + k4)/6; x = x + h;\nend\nfprintf('Value at %.2f is %.4f\\n', xn, y);" },
        { id: 8, name: "8. Euler's Method", code: "f = @(x, y) x + y;\nx0 = 0; y0 = 1; h = 0.1; xn = 1;\nn = (xn-x0)/h; x = x0; y = y0;\nfor i = 1:n\n    y = y + h * f(x, y); x = x + h;\nend\nfprintf('Value at %.1f is %.2f\\n', xn, y);" }
    ];

    function doFakeLogin() {
        const pw = document.getElementById('password').value;
        const err = document.getElementById('loginErr');
        if (pw === KEY) {
            err.style.display = 'none';
            document.getElementById('answerSection').style.display = 'block';
            renderAnswers();
        } else {
            err.style.display = 'block';
            document.getElementById('password').value = '';
        }
    }

    function renderAnswers() {
        const list = document.getElementById('answerList');
        list.innerHTML = ANSWERS.map(a => `
            <div class="program-row" onclick="copyCode(${a.id}, this)">
                <span class="program-name">${a.name}</span>
                <span class="copy-status">✓</span>
            </div>
        `).join('');
    }

    function copyCode(id, el) {
        const program = ANSWERS.find(a => a.id === id);
        const statusIcon = el.querySelector('.copy-status');
        
        navigator.clipboard.writeText(program.code).then(() => {
            statusIcon.style.opacity = '1';
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => {
                statusIcon.style.opacity = '0';
                t.style.opacity = '0';
            }, 1000);
        });
    }
</script>

</body>
</html>
